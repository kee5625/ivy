<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ivy — Manuscript Intelligence</title>

  <!-- Fonts: editorial serif (Source Serif 4) + Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Source Serif 4"', 'Georgia', 'serif'],
            sans:  ['Inter', 'ui-sans-serif', 'system-ui'],
            mono:  ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          }
        }
      }
    };
  </script>

  <style>
    :root {
      /* default to archive palette; theme.jsx may override on load */
      --ivy-bg: oklch(0.965 0.006 240);
      --ivy-bgRaised: oklch(0.992 0.003 240);
      --ivy-bgInk: oklch(0.945 0.011 240);
      --ivy-panel: oklch(0.92 0.013 240);
      --ivy-rule: oklch(0.81 0.014 240);
      --ivy-ruleSoft: oklch(0.89 0.01 240);
      --ivy-ink: oklch(0.26 0.045 252);
      --ivy-inkDeep: oklch(0.13 0.055 252);
      --ivy-inkMute: oklch(0.46 0.028 250);
      --ivy-inkFaint: oklch(0.6 0.018 250);
      --ivy-accent: oklch(0.58 0.13 70);
      --ivy-accentSoft: oklch(0.91 0.05 75);
      --ivy-accentInk: oklch(0.38 0.11 70);
      --ivy-sev_high: oklch(0.5 0.16 25);
      --ivy-sev_med: oklch(0.6 0.13 70);
      --ivy-sev_low: oklch(0.55 0.03 240);
    }
    html, body { background: var(--ivy-bg); color: var(--ivy-ink); }
    body { font-family: Inter, ui-sans-serif, system-ui; }
    .font-serif { font-family: 'Source Serif 4', Georgia, serif; font-feature-settings: "ss01", "kern"; }
    .font-mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    /* hide scrollbar polish */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--ivy-rule); border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    em { font-style: italic; }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- data + theme + atoms first -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="theme.jsx"></script>
  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="view-library.jsx"></script>
  <script type="text/babel" src="view-manuscript.jsx"></script>
  <script type="text/babel" src="view-timeline.jsx"></script>
  <script type="text/babel" src="view-issues.jsx"></script>
  <script type="text/babel" src="view-characters.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "archive"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [view, setView] = React.useState("library");
      const [manuscript, setManuscript] = React.useState(null);

      // Apply palette
      React.useEffect(() => { window.applyIvyPalette(tweaks.palette); }, [tweaks.palette]);

      const openManuscript = (m) => {
        setManuscript(m);
        setView("manuscript");
      };

      let body = null;
      if (view === "library")     body = <LibraryView onOpen={openManuscript}/>;
      else if (view === "manuscript") body = <ManuscriptView/>;
      else if (view === "timeline")   body = <TimelineView/>;
      else if (view === "issues")     body = <IssuesView/>;
      else if (view === "characters") body = <CharactersView/>;

      return (
        <div className="h-screen flex flex-col" style={{ background: "var(--ivy-bg)" }}>
          <TopBar palette={tweaks.palette} setPalette={(p) => setTweak("palette", p)} manuscriptTitle={manuscript?.title}/>
          <div className="flex-1 flex overflow-hidden" data-screen-label="ivy">
            <Sidebar view={view} setView={setView} manuscript={manuscript} jobStatus={manuscript?.status || (view === "library" ? "" : "complete")}/>
            <main className="flex-1 overflow-auto" data-screen-label={view}>
              {body}
            </main>
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Palette">
              <TweakRadio
                label="Color theme"
                value={tweaks.palette}
                options={[
                  { value: "manuscript", label: "Manuscript" },
                  { value: "archive",    label: "Archive" },
                  { value: "slate",      label: "Slate" },
                ]}
                onChange={(v) => setTweak("palette", v)}
              />
            </TweakSection>
            <TweakSection label="Jump to view">
              {NAV.map(n => (
                <button key={n.key} onClick={() => setView(n.key)} className="block w-full text-left text-[12px] py-1" style={{ color: view === n.key ? "var(--ivy-accent)" : "var(--ivy-inkMute)" }}>
                  → {n.label}
                </button>
              ))}
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
